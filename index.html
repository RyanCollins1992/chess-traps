<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Chess Opening Traps</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#d4d0c8;font-size:14px;line-height:1.5;min-height:100vh}

/* TOP BAR */
.topbar{background:#0f0f1a;border-bottom:1px solid #2a2a4a;padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:600;color:#fff;flex:1}
.topbar span{font-size:11px;color:#4a4a6a}

/* TRAP SELECTOR - horizontal scroll on mobile */
.trap-selector{background:#12122a;border-bottom:1px solid #2a2a4a;overflow-x:auto;-webkit-overflow-scrolling:touch;display:flex;gap:0;scrollbar-width:none}
.trap-selector::-webkit-scrollbar{display:none}
.trap-tab{flex-shrink:0;padding:10px 14px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-size:12px;font-weight:500;color:#5a5a7a;transition:all .15s;border-right:1px solid #1e1e3a}
.trap-tab:hover{background:#1a1a3a;color:#9a9ab8}
.trap-tab.active{border-bottom-color:#629924;color:#aed67a;background:#161628}
.trap-tab .tt-level{font-size:9px;display:block;margin-top:1px;opacity:.6}

/* SECTION LABEL in selector */
.sel-label{flex-shrink:0;padding:10px 10px;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#3a3a5a;display:flex;align-items:center;border-right:1px solid #1e1e3a;background:#0e0e1e}

/* MAIN CONTENT */
.main{display:flex;flex-direction:column;max-width:900px;margin:0 auto;padding:12px}

/* TRAP HEADER */
.trap-header{padding:10px 0 8px;border-bottom:1px solid #2a2a4a;margin-bottom:12px}
.trap-title{font-size:18px;font-weight:700;color:#fff}
.trap-sub{font-size:12px;color:#5a5a7a;margin-top:2px}

/* BOARD + STUDY layout - side by side on tablet+, stacked on phone */
.board-study{display:flex;gap:14px;align-items:flex-start}
@media(max-width:600px){.board-study{flex-direction:column}}

/* BOARD SIDE */
.board-side{flex-shrink:0;display:flex;flex-direction:column;gap:8px;align-items:center;width:100%}
@media(min-width:601px){.board-side{width:auto}}

.board-outer{display:inline-flex;flex-direction:column;gap:2px}
.board-row{display:flex;align-items:stretch;gap:2px}
.rank-strip{display:flex;flex-direction:column;width:16px}
.rank-lbl{font-size:10px;color:#4a4a6a;text-align:center;font-family:monospace;display:flex;align-items:center;justify-content:center}
.file-strip{display:flex;padding-left:18px}
.file-lbl{text-align:center;font-size:10px;color:#4a4a6a;font-family:monospace}

/* Board scales to fit screen */
.cboard-wrap{position:relative}
.cboard{display:grid;grid-template-columns:repeat(8,1fr);border:2px solid #3a3a2a;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.sq{position:relative;display:flex;align-items:center;justify-content:center}
.sq.light{background:#f0d9b5}
.sq.dark{background:#b58863}
.sq.hl-from{background:#aaa23a!important}
.sq.hl-to{background:#cdd16f!important}
.sq.hl-check{background:#cc3333!important}
.sq svg{display:block;width:90%;height:90%;pointer-events:none}
.arrow-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;overflow:visible}

/* NAV */
.nav-bar{display:flex;align-items:center;gap:6px;justify-content:center}
.nb{min-width:38px;height:38px;border-radius:8px;border:1px solid #2a2a4a;background:#1a1a3a;color:#b0b0c8;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.nb:active{background:#2a2a5a}
.nb:disabled{opacity:.3}
.nav-info{font-size:12px;color:#5a5a7a;min-width:70px;text-align:center;font-family:monospace}

/* NOTATION - wraps naturally */
.notation-wrap{background:#0e0e1e;border-radius:8px;padding:8px 10px;display:flex;flex-wrap:wrap;align-items:baseline;gap:1px;font-family:monospace;font-size:13px;line-height:2}
.mn{color:#3a3a5a;font-size:11px;margin-right:1px}
.mv{padding:2px 5px;border-radius:4px;cursor:pointer;color:#6a6a8a;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mv:active{background:#2a2a4a}
.mv.cur{background:#629924;color:#fff;font-weight:700}
.mv.played{color:#c0b8a8}
.mv.future{color:#3a3a5a}

/* STUDY SIDE */
.study-side{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}

/* COACHING CARD */
.coach-card{background:#12122a;border:1px solid #2a2a4a;border-radius:10px;padding:12px 14px}
.who-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:100px;margin-bottom:6px}
.ww{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.12)}
.wb{background:rgba(60,60,100,.35);color:#8888aa;border:1px solid rgba(80,80,120,.25)}
.c-move{font-size:18px;font-weight:700;color:#fff;font-family:monospace}
.c-hl{font-size:13px;font-weight:600;color:#aed67a;margin-top:4px;line-height:1.35}
.c-txt{font-size:13px;color:#9a9ab8;line-height:1.65;margin-top:6px}
.c-box{border-radius:6px;padding:8px 11px;font-size:12px;line-height:1.55;margin-top:8px}
.cb-why{background:#0a1a04;border-left:3px solid #629924;color:#8aaa60}
.cb-why strong{color:#aed67a}
.cb-warn{background:#1a0808;border-left:3px solid #993333;color:#bb7070}
.cb-warn strong{color:#ee8888}
.cb-tip{background:#040f1a;border-left:3px solid #336699;color:#6888aa}
.start-card{background:#12122a;border:1px solid #2a2a4a;border-radius:10px;padding:24px;text-align:center;color:#4a4a6a}
.start-card .bp{font-size:40px;margin-bottom:8px;opacity:.3}

/* SUMMARY */
.summary{display:flex;flex-direction:column;gap:6px}
.si{font-size:12px;line-height:1.55;padding:8px 10px;border-radius:6px}
.si .sl{font-size:9px;text-transform:uppercase;letter-spacing:.07em;opacity:.6;margin-bottom:3px;font-weight:700;display:block}
.si-r{background:#180606;color:#bb6060;border-left:3px solid #882222}
.si-g{background:#061206;color:#60aa50;border-left:3px solid #335522}
.si-b{background:#060818;color:#6080bb;border-left:3px solid #334488}

/* Swipe hint */
.swipe-hint{text-align:center;font-size:11px;color:#3a3a5a;padding:4px 0}

/* COACH BUTTON */
.coach-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1.5px solid #7a3fa0;background:#1a0a2a;color:#c07aee;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;width:100%;justify-content:center}
.coach-btn:hover{background:#2a1040;border-color:#a060d0}
.coach-btn:active{background:#3a1850}
.coach-btn.thinking{border-color:#9a5ac0;color:#9a6ab8;animation:pulse 1s ease-in-out infinite}
.coach-btn.done{border-color:#9a3fd0;background:#22083a;color:#d09aee}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.cb-coach{background:#1a0828;border-left:3px solid #9a3fd0;color:#c090e0;margin-top:8px}
.cb-coach strong{color:#d0a0ff}
</style>
</head>
<body>

<div class="topbar">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#629924" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
  <h1>Chess Opening Traps</h1>
  <span>15 traps</span>
</div>

<div class="trap-selector" id="trap-selector"></div>

<div class="main">
  <div class="trap-header">
    <div class="trap-title" id="trap-title">Loading...</div>
    <div class="trap-sub" id="trap-sub"></div>
  </div>

  <div class="board-study">
    <!-- BOARD -->
    <div class="board-side">
      <div class="board-outer">
        <div class="board-row">
          <div class="rank-strip" id="rank-strip"></div>
          <div class="cboard-wrap" id="cboard-wrap">
            <div class="cboard" id="cboard"></div>
            <svg class="arrow-svg" id="arrow-svg" viewBox="0 0 416 416" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
        <div class="file-strip" id="file-strip"></div>
      </div>

      <div class="notation-wrap" id="notation"></div>

      <div class="nav-bar">
        <button class="nb" id="b-first" onclick="navFirst()">⏮</button>
        <button class="nb" id="b-prev"  onclick="navPrev()">◀</button>
        <span class="nav-info" id="nav-info">—</span>
        <button class="nb" id="b-next"  onclick="navNext()">▶</button>
        <button class="nb" id="b-last"  onclick="navLast()">⏭</button>
      </div>
      <div class="swipe-hint">Tap ◀ ▶ or use arrow keys · swipe left/right</div>
      <button class="coach-btn" id="coach-btn" onclick="askCoach()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        Ask Coach — Best Move
      </button>
    </div>

    <!-- STUDY -->
    <div class="study-side">
      <div id="coach-card" class="start-card">
        <div class="bp">♟</div>
        <div style="font-size:13px">Press <strong style="color:#aed67a">▶ Next</strong> to step through every move</div>
      </div>
      <div class="summary" id="summary"></div>
    </div>
  </div>
</div>

{san:"Qf3+",hl:"7.Qf3+ — Chase the king!",txt:"Check! Queen develops with tempo. Every White move attacks the king."},
{san:"Ke6",hl:"7...Ke6 — King walks into a storm",txt:"King retreats to e6 — the heart of the board, surrounded by enemy pieces."},
{san:"Nc3",hl:"8.Nc3 — More attackers! King is losing",txt:"Develops AND attacks the Nd5. White has enormous compensation. The king on e6 will be hunted all game.",tip:"White wins this position very frequently in practice — the attack is too hard to handle under time pressure."}
],
summary:{mistake:"Black plays Nxd5 then is forced Kxf7 — king exposed for the entire game.",punish:"After Ke6, White plays d4, Nd5, Re1 — the king has no safe square.",fallback:"If Black plays Na5, play Bb5+ c6 Qf3 — strong position without the sacrifice."}},

{id:'w2',side:'White',level:'Beginner',name:"Scholar's Mate",sub:"Checkmate in 4 moves",
moves:[
{san:"e4",hl:"1.e4",txt:"Central pawn, classic start."},
{san:"e5",hl:"1...e5",txt:"Black mirrors in the centre."},
{san:"Bc4",hl:"2.Bc4 — Bishop targets f7 immediately",txt:"White immediately targets f7 with the bishop. One half of the Scholar's Mate battery.",why:"f7 is only defended by the king — Bc4 starts the mating battery immediately."},
{san:"Nc6",hl:"2...Nc6 — Misses the coming threat",txt:"Natural development, but does nothing to defend f7."},
{san:"Qh5",hl:"3.Qh5! — TWO threats at once!",txt:"Creates TWO threats: (1) Qxf7# — immediate checkmate, (2) Qxe5 — winning the pawn. Black must deal with BOTH. The only correct defence is g6.",why:"This is the core principle: a double threat that can't both be stopped.",warn:"The only correct defence is 3...g6! which drives the queen back. Always scan for checkmate before attacking pieces!"},
{san:"Nf6",hl:"3...Nf6?? — Attacks queen, misses MATE!",txt:"Black attacks the queen thinking it must move — but completely forgets Qxf7# is checkmate! Nf6 does nothing to defend f7.",warn:"Correct move: 3...g6! driving the queen to f3. Black is fine."},
{san:"Qxf7",hl:"4.Qxf7# — CHECKMATE! 👑",txt:"Qxf7# — checkmate in 4 moves! Queen takes f7, protected by Bc4. King cannot take, cannot move, nothing can block.",tip:"The real lesson: always look for checkmate threats first. A double threat is the most powerful weapon in chess."}
],
summary:{mistake:"Black plays Nf6 to attack the queen, missing Qxf7# is immediate checkmate.",punish:"Qxf7# — game over in 4 moves.",fallback:"If Black plays g6 (correct), retreat to Qf3. Develop Nc3, Nge2, castle."}},

{id:'w3',side:'White',level:'Intermediate',name:"Legal's Trap",sub:"Queen sacrifice for smothered mate",
moves:[
{san:"e4",hl:"1.e4",txt:"Open game."},
{san:"e5",hl:"1...e5",txt:"Mirror."},
{san:"Nf3",hl:"2.Nf3",txt:"Develops and attacks e5."},
{san:"Nc6",hl:"2...Nc6",txt:"Natural defence."},
{san:"Bc4",hl:"3.Bc4 — Italian",txt:"Bishop to c4, eyeing f7."},
{san:"d6",hl:"3...d6 — Solid but slow",txt:"d6 reinforces e5 but is passive — gives White time to set the trap."},
{san:"Nc3",hl:"4.Nc3 — Prepare the trap",txt:"Second knight developed. Everything looks normal.",why:"White is ready for the queen sacrifice if Black plays Bg4."},
{san:"Bg4",hl:"4...Bg4 — The PIN! Walks into the trap!",txt:"Bg4 pins White's f3 knight against the queen. Black thinks the pinned knight can't defend e5 — a fatal mistake.",warn:"The knight doesn't need to be defended here! White is about to spring Legal's Trap."},
{san:"h3",hl:"5.h3 — Invite the capture",txt:"h3 invites Black to take the knight. Most players do — it feels like winning material.",why:"h3 baits the trade. Once Black takes on f3, the trap is sprung."},
{san:"Bxf3",hl:"5...Bxf3 — Taking the 'free' knight",txt:"Black takes the knight, expecting a normal Qxf3 recapture."},
{san:"Qxf3",hl:"6.Qxf3 — Normal recapture... trap is hidden",txt:"White recaptures with the queen. Completely normal. Black now plays Nd4 to attack it..."},
{san:"Nd4",hl:"6...Nd4?? — Fatal mistake!",txt:"Nd4 attacks the queen. Black expects it to run. Instead White sacrifices it!",warn:"Nd4 attacks the queen but leaves f7 completely undefended."},
{san:"Qxf7",hl:"7.Qxf7+!! — QUEEN SACRIFICE!",txt:"Qxf7+!! White gives away the queen! Forces the king to f7 where it's completely exposed. Smothered mate follows.",why:"After Kxf7, Nd5+ is a family fork hitting king AND queen. Then Nc7# is smothered checkmate."},
{san:"Kxf7",hl:"7...Kxf7 — King takes, steps into the net",txt:"King captures the queen. Now on f7 with no shelter. The two knights are about to deliver smothered mate."},
{san:"Nd5",hl:"8.Nd5+ — Family fork!",txt:"Nd5+! Knight checks AND simultaneously attacks the queen on d8. A FAMILY FORK.",why:"White wins back the queen AND delivers checkmate!"},
{san:"Ke6",hl:"8...Ke6 — Into smothered mate!",txt:"King to e6 — the only legal move. Surrounded by its own pieces: d6 pawn, e5 pawn, d8 queen, Nd4."},
{san:"Nc7",hl:"9.Nc7# — SMOTHERED CHECKMATE! 🎭",txt:"Nc7# — CHECKMATE! The king on e6 is surrounded by its own army. White sacrificed a queen and won by checkmate!",tip:"Smothered mate is one of chess's most beautiful patterns. First recorded in 1750 by French master Sire de Légal."}
],
summary:{mistake:"Black plays Nd4 to attack the queen — it gets 'sacrificed' with Qxf7+, leading to smothered checkmate.",punish:"Qxf7+ Kxf7, Nd5+ (family fork), Ke6, Nc7# — smothered mate.",fallback:"If Black retreats Bh5 instead of Bxf3, play d4 — strong central push, White is better."}},

{id:'w4',side:'White',level:'Intermediate',name:"Budapest Gambit Trap",sub:"Back-rank checkmate",
moves:[

{san:"Nf6",hl:"1...Nf6",txt:"Knight to f6."},
{san:"c4",hl:"2.c4",txt:"English system setup."},

{san:"Ng4",hl:"3...Ng4 — Attacking e5",txt:"Knight immediately attacks e5."},
{san:"Bf4",hl:"4.Bf4 — Defend and develop",txt:"Bf4 defends e5 and develops."},
{san:"Nc6",hl:"4...Nc6",txt:"Developing and pressuring e5."},
{san:"Nf3",hl:"5.Nf3",txt:"Development, attacks the Ng4."},
{san:"Bb4",hl:"5...Bb4+ — Check!",txt:"Black checks and pins. White must block carefully."},
{san:"Nbd2",hl:"6.Nbd2 — Block the check",txt:"Nbd2 blocks. Now a3 is the key trap-setting move.",why:"Nbd2 prepares a3 which forces the bishop trade setting up Qd8#."},
{san:"Qe7",hl:"6...Qe7",txt:"Black prepares to recover the e5 pawn."},
{san:"a3",hl:"7.a3! — The trap is SET",txt:"a3 forces the bishop trade. After Bxd2+ Qxd2, the e5 pawn looks free — but it's POISONED.",why:"After the trade, taking e5 loses to Qd8# (back-rank checkmate)!"},
{san:"Bxd2",hl:"7...Bxd2+ — Forced trade",txt:"Black trades the bishop."},
{san:"Qxd2",hl:"8.Qxd2 — Queen perfectly placed",txt:"White's queen moves to d2, aimed at d8. The e5 pawn looks free...",warn:"If Black grabs the e5 pawn, it's back-rank checkmate. The rooks haven't moved, sealing the king's escape."},
{san:"Ngxe5",hl:"8...Ngxe5?? — The greedy mistake!",txt:"Black grabs the 'free' pawn. But the back rank is undefended — Qd8# is coming.",warn:"ALWAYS check your back rank before capturing!"},
{san:"Nxe5",hl:"9.Nxe5",txt:"Exchange continues..."},
{san:"Nxe5",hl:"9...Nxe5",txt:"Black takes back..."},
{san:"Bxe5",hl:"10.Bxe5",txt:"White takes again..."},
{san:"Qxe5",hl:"10...Qxe5 — Everything looks equal...",txt:"Black recaptures. But it's White to move..."},
{san:"Qd8",hl:"11.Qd8# — BACK-RANK CHECKMATE! 💀",txt:"Qd8# — CHECKMATE! Black's own unmoved rooks blocked every escape square.",tip:"Back-rank mate is the #1 most common checkmate pattern under 1500 Elo. Before capturing, ALWAYS ask: 'Is my back rank safe?'"}
],
summary:{mistake:"Black takes the 'free' e5 pawn without noticing the back rank is sealed — Qd8# is checkmate.",punish:"Qd8# — immediate back-rank checkmate.",fallback:"If Black avoids Ngxe5, White is a pawn up. Castle and consolidate."}},

{id:'w5',side:'White',level:'Intermediate',name:"Elephant Trap",sub:"Queen's Gambit — winning e4 pawn",
moves:[
{san:"d4",hl:"1.d4",txt:"Queen's Pawn."},
{san:"d5",hl:"1...d5",txt:"Black mirrors."},
{san:"c4",hl:"2.c4 — Queen's Gambit!",txt:"Offering the c4 pawn for central control.",why:"c4 creates a large pawn centre. White offers a pawn Black usually can't hold."},
{san:"e6",hl:"2...e6 — Queen's Gambit Declined",txt:"Black declines — the most solid response."},
{san:"Nf3",hl:"3.Nf3",txt:"Development."},
{san:"Nf6",hl:"3...Nf6",txt:"Development."},
{san:"Nc3",hl:"4.Nc3",txt:"Second knight."},
{san:"dxc4",hl:"4...dxc4 — Black takes!",txt:"Black accepts the gambit. White usually plays e3 or e4 to regain it. But e4 walks into the trap!"},
{san:"e4",hl:"5.e4? — Greedy attempt",txt:"White pushes e4 trying to reclaim c4 by force. This is the MISTAKE!",warn:"The correct move is e3. e4 allows 5...Bb4! pinning Nc3 and winning the e4 pawn."},
{san:"Bb4",hl:"5...Bb4! — PIN! The e4 pawn falls!",txt:"Bb4 pins the Nc3 against the king! e4 is attacked by Bb4 and Nf6, defended only by the pinned knight — it falls.",why:"The pin on c3 means the knight can't recapture. The e4 pawn falls for free."},
{san:"Nxe4",hl:"5...Nxe4 — Black wins the pawn!",txt:"Black takes the free pawn. White is down material with a weakened position.",tip:"Always play e3 instead of e4 in the Queen's Gambit. e3 is safe, e4 loses material to the Elephant Trap."}
],
summary:{mistake:"White plays e4 (greedy) instead of e3, allowing Bb4 pinning Nc3 and winning the e4 pawn.",punish:"After Bb4 Nxe4, Black is a pawn up with a good position.",fallback:"Always play e3 instead of e4 — safe, solid, keeps the extra pawn."}},

{id:'w6',side:'White',level:'Advanced',name:"Stafford Refutation",sub:"d3 + Be2 + 0-0 — calm and winning",
moves:[
{san:"e4",hl:"1.e4",txt:"Open game."},
{san:"e5",hl:"1...e5",txt:"Mirror."},
{san:"Nf3",hl:"2.Nf3",txt:"Development."},
{san:"Nf6",hl:"2...Nf6 — Stafford incoming!",txt:"Looks like the Petrov. But Black is setting up the Stafford Gambit.",warn:"Don't play Nc3 — it allows Nd4 fork on queen and e4!"},
{san:"Nxe5",hl:"3.Nxe5 — Taking the pawn",txt:"White takes e5."},
{san:"Nc6",hl:"3...Nc6 — The Stafford Gambit!",txt:"Nc6 attacks the knight and offers a second pawn. Black bets on rapid development and chaos.",why:"The Stafford only works if White plays greedily. d3 refutes everything."},
{san:"Nxc6",hl:"4.Nxc6 — Taking again",txt:"White takes."},
{san:"dxc6",hl:"4...dxc6 — Open lines",txt:"Black recaptures with the d-pawn, opening lines."},
{san:"d3",hl:"5.d3! — THE CORRECT REFUTATION",txt:"d3 — solid, simple, refuses to be greedy. Consolidates the extra pawn without falling into tricks.",why:"Why NOT Nc3? Because Nc3 allows Nd4 — forking the queen and e4 pawn. d3 sidesteps everything.",warn:"Many players instinctively play Nc3 here — it loses to Nd4. d3 is correct even though it looks passive."},
{san:"Bc5",hl:"5...Bc5 — Aggressive development",txt:"Bishop to c5, pressuring f2. Standard aggressive Stafford setup."},
{san:"Be2",hl:"6.Be2! — NOT Nc3!",txt:"Be2 — again avoiding Nc3. Develops simply toward castling.",why:"Be2 is unambitious but correct. White is simply a pawn up with no counterplay for Black."},
{san:"Ng4",hl:"6...Ng4 — Trying to create chaos",txt:"Black attacks f2, trying to complicate. White simply castles."},
{san:"O-O",hl:"7.0-0 — Safe king, game over",txt:"White castles. King is safe, pawn is up, Black has no attack. The Stafford has been completely refuted.",tip:"The Stafford is dangerous only against greedy play. d3 + Be2 + 0-0 is the antidote — calm, principled, winning."}
],
summary:{mistake:"White plays Nc3 (natural but wrong) instead of d3, allowing Nd4 fork on queen and e4.",punish:"After 0-0, White is a clean pawn up with no counterplay. Convert the endgame.",fallback:"The whole system IS the answer — d3 + Be2 + 0-0 works in all variations."}},

{id:'b1',side:'Black',level:'Beginner',name:"Traxler Counter-Attack",sub:"Counter-sacrifice against Ng5",
moves:[
{san:"e4",hl:"1.e4",txt:"White opens."},
{san:"e5",hl:"1...e5",txt:"Mirror."},
{san:"Nf3",hl:"2.Nf3",txt:"Development."},
{san:"Nc6",hl:"2...Nc6",txt:"Defends e5."},
{san:"Bc4",hl:"3.Bc4 — Italian",txt:"Bishop targets f7."},
{san:"Nf6",hl:"3...Nf6 — Two Knights",txt:"Development, fights for e4."},
{san:"Ng5",hl:"4.Ng5 — Threatening Nxf7!",txt:"Double attack on f7! Normal response is d5.",warn:"White threatens Nxf7 forking queen and rook. The Traxler ignores the threat completely!"},
{san:"Bc5",hl:"4...Bc5!? — THE TRAXLER! 🔄",txt:"Instead of defending, Black counter-attacks with Bc5! If White takes f7, Black responds with Bxf2+ dragging the king into the open.",why:"Bc5 is a counter-gambit. Black bets the counter-attack is faster and more dangerous than White's attack."},
{san:"Nxf7",hl:"5.Nxf7 — White takes, walks into the trap",txt:"White takes on f7, forking queen and rook. But Black prepared Bxf2+!!",warn:"Correct for White is Bxf7+! (not Nxf7). Nxf7 walks into Black's preparation."},
{san:"Bxf2",hl:"5...Bxf2+!! — Bishop sacrifice!",txt:"Bxf2+!! Black sacrifices the bishop, forcing the White king to f2. Completely exposed with no shelter.",why:"A deflection sacrifice — Black pulls the White king out of safety into the open."},
{san:"Kxf2",hl:"6.Kxf2 — King forced to take",txt:"White must take. The king is on f2, completely exposed."},
{san:"Nxe4",hl:"6...Nxe4+ — Fork!",txt:"Nxe4+ takes the pawn AND gives check. Every Black move attacks something."},
{san:"Kg1",hl:"7.Kg1 — Only safe square",txt:"King retreats. Now Black has the decisive move..."},
{san:"Qh4",hl:"7...Qh4! — Two unstoppable threats!",txt:"Qh4!! creates TWO simultaneous threats: (1) Qxf2# — checkmate, (2) Ng3+ forking king and rook. White cannot stop both.",tip:"This is the Traxler in full force. Know the Bxf2+ idea cold — it's the heart of the whole variation."}
],
summary:{mistake:"White plays Nxf7 (natural) instead of Bxf7+ (correct), allowing Bxf2+ which exposes the king.",punish:"After Bxf2+ Kxf2 Nxe4+ Kg1 Qh4 — White cannot stop both Qf2# and Ng3+.",fallback:"If White plays Bxf7+, play Ke7 — the f7 knight is trapped, Black gets compensation."}},

{id:'b2',side:'Black',level:'Beginner',name:"Englund Gambit Trap",sub:"Bb4!! traps White's rook",
moves:[
{san:"d4",hl:"1.d4",txt:"Queen's Pawn."},
{san:"e5",hl:"1...e5 — The Englund Gambit!",txt:"Black sacrifices a pawn for activity."},
{san:"dxe5",hl:"2.dxe5 — White accepts",txt:"White takes."},
{san:"Nc6",hl:"2...Nc6 — Developing, targeting e5",txt:"Knight develops and attacks e5."},
{san:"Nf3",hl:"3.Nf3",txt:"Development, defends e5."},
{san:"Qe7",hl:"3...Qe7 — Preparing Qb4+",txt:"Queen to e7, preparing the key Qb4+ check.",why:"Qe7 sets up the zwischenzug check on b4 — the heart of the Englund trap."},
{san:"Bf4",hl:"4.Bf4 — Defending e5",txt:"Bishop to f4, defending."},
{san:"Qb4",hl:"4...Qb4+! — The critical check!",txt:"Qb4+! Forces White to block. Wrong block (Bd2) loses the a1 rook. Correct block (Nc3) gives equality.",why:"Qb4+ is a zwischenzug — an in-between check that forces a critical decision."},
{san:"Bd2",hl:"5.Bd2?? — THE WRONG BLOCK!",txt:"Bd2 looks natural but is a catastrophic blunder. After Qxb2, the queen invades and the a1 rook is soon trapped.",warn:"Correct move was Nc3! It blocks the check AND develops a piece. Bd2 creates a fatal pin problem."},
{san:"Qxb2",hl:"5...Qxb2 — Queen invades!",txt:"Queen takes b2 AND attacks the a1 rook. White plays Bc3 to trap the queen — but Black has Bb4!!"},
{san:"Bc3",hl:"6.Bc3 — Trying to trap the queen",txt:"Bc3 attacks the queen. Looks like it might be trapped. But..."},
{san:"Bb4",hl:"6...Bb4!! — PIN! Rook is trapped! 🪤",txt:"Bb4!! pins the Bc3 against the king! The a1 rook has ZERO escape squares — White loses the exchange minimum.",why:"Removing the defender — Bc3 was the only piece guarding the a1 rook. Bb4 pins and removes it.",tip:"Great surprise weapon! If White plays Nc3 (correct), it's just equality. Many players fall for Bd2."}
],
summary:{mistake:"White blocks Qb4+ with Bd2 instead of Nc3, allowing Qxb2 then Bb4 which traps the a1 rook.",punish:"Bb4 pins Bc3 — the rook is trapped. White loses the exchange.",fallback:"If White plays Nc3 (correct), Black plays Nxe5 recovering the pawn with equality."}},

{id:'b3',side:'Black',level:'Intermediate',name:"Nimzowitsch Trap",sub:"Bf5 pins c3, then Ncxe5!! d4!",
moves:[
{san:"e4",hl:"1.e4",txt:"White opens."},
{san:"Nc6",hl:"1...Nc6 — Nimzowitsch Defence!",txt:"Nc6 fights for the centre with a piece. Unconventional and disorienting."},
{san:"d4",hl:"2.d4 — Big pawn centre",txt:"White builds a large pawn centre."},
{san:"d5",hl:"2...d5 — Counterattack!",txt:"d5 directly challenges White's e4."},
{san:"e5",hl:"3.e5 — Advance",txt:"White advances, creating a French-like pawn chain."},
{san:"Bf5",hl:"3...Bf5! — THE KEY MOVE",txt:"Bf5 develops the bishop OUTSIDE the pawn chain. More importantly, Bf5 will PIN the c3 pawn later — making the knight sacrifice work.",why:"Without Bf5 here, the whole combination fails. This bishop is the silent hero of the trap 6 moves from now!"},
{san:"Nf3",hl:"4.Nf3",txt:"Normal development."},
{san:"e6",hl:"4...e6 — Solidifying",txt:"e6 solidifies the pawn structure."},
{san:"Be2",hl:"5.Be2",txt:"White prepares to castle."},
{san:"Nge7",hl:"5...Nge7 — Knight heading to g6",txt:"Knight to e7, preparing Ng6."},
{san:"O-O",hl:"6.0-0 — White castles",txt:"White castles safely."},
{san:"Ng6",hl:"6...Ng6 — Knight reaches ideal post",txt:"Ng6 — active and ready."},
{san:"c3",hl:"7.c3 — Supports d4",txt:"c3 supports d4. This pawn will become PINNED by Bf5 when Black plays the combination.",why:"c3 is normal — but combined with Bf5 on the board, it creates the pin that makes the sacrifice work."},
{san:"Be7",hl:"7...Be7 — Preparing castling",txt:"Bishop develops."},
{san:"h3",hl:"8.h3?! — Slow! Gives Black a free hand",txt:"h3 wastes tempo. Black is ready to spring the combination.",warn:"Re1 or Bg5 would have been more active. h3 gives Black the free move needed."},
{san:"Ncxe5",hl:"8...Ncxe5!! — KNIGHT SACRIFICE! 💥",txt:"Ncxe5!! Black sacrifices the knight. After dxe5, d4! The c3 pawn is PINNED and CANNOT recapture. White's pawn chain collapses.",why:"This works ONLY because Bf5 is on the board — it pins c3. This is why Bf5 was played on move 3!"},
{san:"dxe5",hl:"9.dxe5 — White must take",txt:"White captures. Now the pawn break..."},
{san:"d4",hl:"9...d4! — Centre collapses!",txt:"d4!! The pawn attacks c3 — but c3 CANNOT TAKE because it's pinned by Bf5! The pawn advances for free, White's centre collapses.",tip:"Beautiful long-range planning: Bf5 on move 3 was preparation for this d4 break on move 9. This is chess mastery."}
],
summary:{mistake:"White plays h3 (slow) instead of Re1/Bg5, giving Black the free move to execute the knight sacrifice.",punish:"After Ncxe5 dxe5 d4, c3 is pinned — White's pawn chain collapses.",fallback:"With active play (Bg5, Re1), Black castles long and plays counterplay on the kingside."}},

{id:'b4',side:'Black',level:'Advanced',name:"Poisoned Pawn — Najdorf",sub:"Stealing the b2 pawn",
moves:[
{san:"e4",hl:"1.e4",txt:"White opens."},
{san:"c5",hl:"1...c5 — Sicilian!",txt:"The Sicilian Defence — most popular and analysed response to e4.",why:"The Sicilian leads to unbalanced, fighting positions. The opening of choice for aggressive players."},

{san:"d6",hl:"2...d6",txt:"The Najdorf setup begins."},

{san:"cxd4",hl:"3...cxd4",txt:"Black captures."},
{san:"Nxd4",hl:"4.Nxd4",txt:"White recaptures with the knight."},
{san:"Nf6",hl:"4...Nf6 — Development",txt:"Knight develops, attacks e4."},
{san:"Nc3",hl:"5.Nc3",txt:"Defends e4."},
{san:"a6",hl:"5...a6 — THE NAJDORF!",txt:"a6 — one of the most studied moves in chess history. Prevents Nb5, prepares b5 queenside expansion.",why:"a6 signals that Black intends a queenside counterattack. Fischer, Kasparov, and Tal all played the Najdorf."},
{san:"Bg5",hl:"6.Bg5 — Pinning the Nf6",txt:"Bg5 pins the knight against the queen. One of White's most aggressive setups."},
{san:"e6",hl:"6...e6 — Breaking the pin",txt:"e6 breaks the pin and prepares the Poisoned Pawn."},

{san:"Qd2",hl:"8.Qd2 — Not defending b2",txt:"White prepares Rb1 to 'trap' the queen. The b2 pawn is deliberately left en prise!"},

{san:"exf2",hl:"6...exf2+ — Check!",txt:"The pawn takes on f2 with check! Now it threatens to promote."},
{san:"Ke2",hl:"7.Ke2 — Forced king move",txt:"White's king is forced to move."},
{san:"fxg1",hl:"7...fxg1=N!! — UNDERPROMOTION! 👑",txt:"fxg1=N!! Promote to a KNIGHT, not a queen! The knight immediately forks the king on e2. Promoting to a queen would give nothing — the knight delivers an immediate winning fork!",tip:"Underpromotion to a knight is extremely rare — and extremely effective here. Lasker's Trap is over 100 years old!"}
],
summary:{mistake:"White plays e3 (natural) instead of Nf3/e4, allowing dxe3!! exf2+ fxg1=N!! winning combination.",punish:"After fxg1=N+, the knight forks king and rook — Black wins decisive material.",fallback:"White should play Nf3 or e4 instead of e3 to avoid the trap."}}
];

// ── STATE ─────────────────────────────────────────────────────────────
const FILES=['a','b','c','d','e','f','g','h'];
let chess=new Chess(), CT=null, CP=-1;

// ── BOARD SIZE (responsive) ───────────────────────────────────────────
function getBoardSize(){
  const vw=Math.min(window.innerWidth,600);
  return Math.floor((vw-48)/8)*8; // multiple of 8, fits screen with padding
}

// ── BUILD BOARD ───────────────────────────────────────────────────────
function buildBoard(){
  const SZ=getBoardSize();
  const sqSz=SZ/8;
  const board=document.getElementById('cboard');
  board.innerHTML='';
  board.style.width=SZ+'px';
  board.style.height=SZ+'px';
  board.style.gridTemplateColumns=`repeat(8,${sqSz}px)`;
  board.style.gridTemplateRows=`repeat(8,${sqSz}px)`;

  // rank labels
  const rs=document.getElementById('rank-strip');
  rs.innerHTML='';
  for(let r=8;r>=1;r--){
    const d=document.createElement('div');
    d.className='rank-lbl';
    d.style.height=sqSz+'px';
    d.textContent=r;
    rs.appendChild(d);
  }
  // file labels
  const fs=document.getElementById('file-strip');
  fs.innerHTML='';
  fs.style.paddingLeft='18px';
  FILES.forEach(f=>{
    const d=document.createElement('div');
    d.className='file-lbl';
    d.style.width=sqSz+'px';
    d.textContent=f;
    fs.appendChild(d);
  });
  // squares
  for(let rank=7;rank>=0;rank--){
    for(let file=0;file<8;file++){
      const sq=document.createElement('div');
      const sqName=FILES[file]+(rank+1);
      sq.id='sq-'+sqName;
      sq.className='sq '+((file+rank)%2===0?'dark':'light');
      sq.style.width=sqSz+'px';
      sq.style.height=sqSz+'px';
      board.appendChild(sq);
    }
  }
  // Update arrow SVG viewBox
  const svg=document.getElementById('arrow-svg');
  svg.setAttribute('viewBox',`0 0 ${SZ} ${SZ}`);
}

// ── RENDER BOARD ──────────────────────────────────────────────────────
function renderBoard(fromSq,toSq){
  document.querySelectorAll('.sq').forEach(el=>{
    el.innerHTML='';
    el.classList.remove('hl-from','hl-to','hl-check');
  });
  const board=chess.board();
  for(let r=0;r<8;r++){
    for(let f=0;f<8;f++){
      const piece=board[r][f];
      if(!piece) continue;
      const sqName=FILES[f]+(8-r);
      const el=document.getElementById('sq-'+sqName);
      if(!el) continue;
      const code=piece.color+piece.type.toUpperCase();
      const svgStr=P[code];
      if(svgStr) el.innerHTML=svgStr;
    }
  }
  if(fromSq){const e=document.getElementById('sq-'+fromSq);if(e)e.classList.add('hl-from');}
  if(toSq){const e=document.getElementById('sq-'+toSq);if(e)e.classList.add('hl-to');}
  if(chess.in_check()){
    const turn=chess.turn();
    const b2=chess.board();
    for(let r=0;r<8;r++)for(let f=0;f<8;f++){
      const p=b2[r][f];
      if(p&&p.type==='k'&&p.color===turn){
        const n=FILES[f]+(8-r);
        const e=document.getElementById('sq-'+n);
        if(e)e.classList.add('hl-check');
      }
    }
  }
}

// ── ARROWS ────────────────────────────────────────────────────────────
function clearArrows(){const svg=document.getElementById('arrow-svg');while(svg.firstChild)svg.removeChild(svg.firstChild);}
function drawArrow(from,to,color){
  const SZ=getBoardSize();
  const sqSz=SZ/8;
  const svg=document.getElementById('arrow-svg');
  const fi=FILES.indexOf(from[0]),fr=8-parseInt(from[1]);
  const ti=FILES.indexOf(to[0]),tr=8-parseInt(to[1]);
  const fx=(fi+.5)*sqSz,fy=(fr+.5)*sqSz;
  const tx=(ti+.5)*sqSz,ty=(tr+.5)*sqSz;
  const dx=tx-fx,dy=ty-fy,len=Math.sqrt(dx*dx+dy*dy);
  const nx=dx/len,ny=dy/len;
  const id='m'+Math.random().toString(36).slice(2,8);
  const ns='http://www.w3.org/2000/svg';
  const defs=document.createElementNS(ns,'defs');
  const mk=document.createElementNS(ns,'marker');
  mk.setAttribute('id',id);mk.setAttribute('viewBox','0 0 10 10');
  mk.setAttribute('refX','8');mk.setAttribute('refY','5');
  mk.setAttribute('markerWidth','3.5');mk.setAttribute('markerHeight','3.5');
  mk.setAttribute('orient','auto');
  const mp=document.createElementNS(ns,'path');
  mp.setAttribute('d','M1 1L9 5L1 9z');mp.setAttribute('fill',color);
  mk.appendChild(mp);defs.appendChild(mk);svg.appendChild(defs);
  const line=document.createElementNS(ns,'line');
  line.setAttribute('x1',(fx+nx*sqSz*.15).toFixed(1));
  line.setAttribute('y1',(fy+ny*sqSz*.15).toFixed(1));
  line.setAttribute('x2',(tx-nx*sqSz*.28).toFixed(1));
  line.setAttribute('y2',(ty-ny*sqSz*.28).toFixed(1));
  line.setAttribute('stroke',color);
  line.setAttribute('stroke-width',(sqSz*.16).toFixed(1));
  line.setAttribute('stroke-opacity','0.75');
  line.setAttribute('stroke-linecap','round');
  line.setAttribute('marker-end','url(#'+id+')');
  svg.appendChild(line);
}

// ── NOTATION ──────────────────────────────────────────────────────────
function buildNotation(trap,ply){
  const el=document.getElementById('notation');
  el.innerHTML='';
  let mn=1;
  trap.moves.forEach((m,i)=>{
    if(i%2===0){const s=document.createElement('span');s.className='mn';s.textContent=mn+'.';el.appendChild(s);mn++;}
    const s=document.createElement('span');
    s.className='mv'+(i===ply?' cur':i<ply?' played':' future');
    s.textContent=m.san;s.onclick=()=>goToPly(i);
    el.appendChild(s);
  });
  const cur=el.querySelector('.cur');
  if(cur)cur.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── COACHING ──────────────────────────────────────────────────────────
function buildCoaching(trap,ply){
  const el=document.getElementById('coach-card');
  if(ply<0){
    el.className='start-card';
    el.innerHTML=`<div class="bp">♟</div><div style="font-size:13px">Press <strong style="color:#aed67a">▶ Next</strong> to step through every move</div>`;
    return;
  }
  el.className='coach-card';
  const m=trap.moves[ply];
  const isW=ply%2===0;
  let html=`<span class="who-badge ${isW?'ww':'wb'}">${isW?'♔ White':'♚ Black'}</span>
    <div class="c-move">${m.san}</div>
    <div class="c-hl">${m.hl}</div>
    <div class="c-txt">${m.txt}</div>`;
  if(m.why)html+=`<div class="c-box cb-why"><strong>Why:</strong> ${m.why}</div>`;
  if(m.warn)html+=`<div class="c-box cb-warn"><strong>⚠</strong> ${m.warn}</div>`;
  if(m.tip)html+=`<div class="c-box cb-tip">💡 ${m.tip}</div>`;
  el.innerHTML=html;
}

// ── SUMMARY ───────────────────────────────────────────────────────────
function buildSummary(trap){
  const el=document.getElementById('summary');
  if(!trap){el.innerHTML='';return;}
  const s=trap.summary;
  el.innerHTML=`
    <div class="si si-r"><span class="sl">The Mistake</span>${s.mistake}</div>
    <div class="si si-b"><span class="sl">The Punishment</span>${s.punish}</div>
    <div class="si si-g"><span class="sl">If They Avoid It</span>${s.fallback}</div>`;
}

// ── COACH UI RESET ────────────────────────────────────────────────────
function resetCoachUI() {
  const btn = document.getElementById('coach-btn');
  if (btn) { btn.className='coach-btn'; btn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Ask Coach — Best Move`; }
  const prev = document.getElementById('coach-suggestion');
  if (prev) prev.remove();
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function goToTrap(trap){
  CT=trap;CP=-1;chess=new Chess();
  document.querySelectorAll('.trap-tab').forEach(e=>e.classList.toggle('active',e.dataset.id===trap.id));
  document.getElementById('trap-title').textContent=trap.name;
  document.getElementById('trap-sub').textContent=trap.sub;
  // Scroll selector to active tab
  const activeTab=document.querySelector('.trap-tab.active');
  if(activeTab)activeTab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  buildBoard();
  renderBoard(null,null);
  clearArrows();
  buildNotation(trap,-1);
  buildCoaching(trap,-1);
  buildSummary(trap);
  updateNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goToPly(ply){
  if(!CT)return;
  resetCoachUI();
  chess=new Chess();
  let lastFrom=null,lastTo=null;
  for(let i=0;i<=ply;i++){
    const san=CT.moves[i].san;
    let result=chess.move(san);
    if(!result)result=chess.move(san.replace(/[+#!?]/g,''));
    if(!result){
      const clean=san.replace(/[+#!?]/g,'');
      const mv=chess.moves({verbose:true}).find(m=>m.san===clean||m.san.replace(/[+#!?]/g,'')===clean);
      if(mv)result=chess.move(mv.san);
    }
    if(result){lastFrom=result.from;lastTo=result.to;}
  }
  CP=ply;
  renderBoard(lastFrom,lastTo);
  clearArrows();
  if(lastFrom&&lastTo)drawArrow(lastFrom,lastTo,ply%2===0?'#aed67a':'#74a8d4');
  buildNotation(CT,ply);
  buildCoaching(CT,ply);
  updateNav();
}

function navFirst(){if(CT){resetCoachUI();chess=new Chess();CP=-1;renderBoard(null,null);clearArrows();buildNotation(CT,-1);buildCoaching(CT,-1);updateNav();}}
function navPrev(){if(CT&&CP>-1)goToPly(CP-1);}
function navNext(){if(CT&&CP<CT.moves.length-1)goToPly(CP+1);}
function navLast(){if(CT)goToPly(CT.moves.length-1);}

function updateNav(){
  document.getElementById('b-first').disabled=!CT||CP<0;
  document.getElementById('b-prev').disabled=!CT||CP<0;
  document.getElementById('b-next').disabled=!CT||CP>=(CT?.moves.length-1);
  document.getElementById('b-last').disabled=!CT||CP>=(CT?.moves.length-1);
  document.getElementById('nav-info').textContent=!CT?'—':CP<0?'Start':`${CP+1}/${CT.moves.length}`;
}

// ── KEYBOARD ─────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();navNext();}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();navPrev();}
});

// ── SWIPE SUPPORT ─────────────────────────────────────────────────────
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>60){dx<0?navNext():navPrev();}
},{passive:true});

// ── BUILD SELECTOR ────────────────────────────────────────────────────
function buildSelector(){
  const sel=document.getElementById('trap-selector');
  sel.innerHTML='';
  const whites=TRAPS.filter(t=>t.side==='White');
  const blacks=TRAPS.filter(t=>t.side==='Black');
  const wLabel=document.createElement('div');
  wLabel.className='sel-label';wLabel.textContent='♔ White';sel.appendChild(wLabel);
  whites.forEach(t=>{
    const tab=document.createElement('div');
    tab.className='trap-tab';tab.dataset.id=t.id;
    tab.innerHTML=`${t.name}<span class="tt-level">${t.level}</span>`;
    tab.onclick=()=>goToTrap(t);
    sel.appendChild(tab);
  });
  const bLabel=document.createElement('div');
  bLabel.className='sel-label';bLabel.textContent='♚ Black';sel.appendChild(bLabel);
  blacks.forEach(t=>{
    const tab=document.createElement('div');
    tab.className='trap-tab';tab.dataset.id=t.id;
    tab.innerHTML=`${t.name}<span class="tt-level">${t.level}</span>`;
    tab.onclick=()=>goToTrap(t);
    sel.appendChild(tab);
  });
}

// ── RESIZE ────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  buildBoard();
  if(CT&&CP>=0)goToPly(CP);
  else if(CT){renderBoard(null,null);clearArrows();}
});

buildSelector();
goToTrap(TRAPS[0]);

// ── STOCKFISH COACH ───────────────────────────────────────────────────
let stockfish = null;
let coachArrowFrom = null;
let coachArrowTo = null;
let sfReady = false;

// Piece type labels for coach explanation
const PIECE_NAMES = {p:'Pawn',n:'Knight',b:'Bishop',r:'Rook',q:'Queen',k:'King'};

function initStockfish() {
  if (stockfish) return;
  try {
    // Load Stockfish as a Web Worker via CDN
    stockfish = new Worker('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');
    stockfish.onmessage = handleSFMessage;
    stockfish.onerror = () => { sfReady = false; showCoachError('Engine failed to load. Try refreshing.'); };
    stockfish.postMessage('uci');
  } catch(e) {
    showCoachError('Web Workers not supported in this browser.');
  }
}

function handleSFMessage(event) {
  const msg = event.data;
  if (msg === 'uciok') { stockfish.postMessage('isready'); return; }
  if (msg === 'readyok') { sfReady = true; return; }

  // Parse bestmove
  if (msg.startsWith('bestmove')) {
    const parts = msg.split(' ');
    const bestMove = parts[1];
    if (!bestMove || bestMove === '(none)') {
      showCoachError('No legal moves available.');
      return;
    }
    // bestmove is in UCI format: e.g. "e2e4", "g1f3", "e7e8q"
    const from = bestMove.slice(0, 2);
    const to   = bestMove.slice(2, 4);
    const promo = bestMove.length > 4 ? bestMove[4] : null;

    // Get piece info from current chess position
    const piece = chess.get(from);
    const captured = chess.get(to);
    coachArrowFrom = from;
    coachArrowTo = to;

    // Redraw arrows: keep last-move arrow + add purple coach arrow
    const lastFrom = document.querySelector('.hl-from')?.id?.replace('sq-','');
    const lastTo   = document.querySelector('.hl-to')?.id?.replace('sq-','');
    clearArrows();
    if (lastFrom && lastTo) {
      const color = CP%2===0 ? '#aed67a' : '#74a8d4';
      drawArrow(lastFrom, lastTo, color);
    }
    drawArrow(from, to, '#9a3fd0'); // purple coach arrow

    // Build coach explanation
    const pName = piece ? PIECE_NAMES[piece.type] : 'Piece';
    const side = chess.turn() === 'w' ? 'White' : 'Black';
    let explanation = `Move the <strong>${pName}</strong> from <strong>${from}</strong> to <strong>${to}</strong>.`;
    if (captured) explanation += ` This captures the ${PIECE_NAMES[captured.type]}.`;
    if (promo) explanation += ` Promote to a ${PIECE_NAMES[promo]}!`;

    // Add coach suggestion to the coaching card
    const existingBox = document.getElementById('coach-suggestion');
    if (existingBox) existingBox.remove();
    const coachCard = document.getElementById('coach-card');
    const box = document.createElement('div');
    box.id = 'coach-suggestion';
    box.className = 'c-box cb-coach';
    box.innerHTML = `<strong>🟣 Coach suggests:</strong> <span style="font-family:monospace;font-weight:700;font-size:14px;color:#d0a0ff">${from}→${to}</span><br><span style="margin-top:4px;display:block">${explanation}</span>`;
    coachCard.appendChild(box);

    // Update button state
    const btn = document.getElementById('coach-btn');
    btn.className = 'coach-btn done';
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg> Coach: ${from}→${to} (tap to refresh)`;
  }

  // Parse eval info for depth feedback
  if (msg.includes('score cp')) {
    const match = msg.match(/score cp (-?\d+)/);
    if (match) {
      const cp = parseInt(match[1]);
      const pawn = (cp / 100).toFixed(1);
      const evalEl = document.getElementById('coach-eval');
      if (!evalEl) {
        const btn = document.getElementById('coach-btn');
        if (btn && btn.className.includes('thinking')) {
          btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Analysing... eval: ${cp > 0 ? '+' : ''}${pawn}`;
        }
      }
    }
  }
}

function askCoach() {
  if (!CT || CP < 0) {
    showCoachError('Step through at least one move first, then ask the coach.');
    return;
  }

  const btn = document.getElementById('coach-btn');
  btn.className = 'coach-btn thinking';
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Coach is thinking...`;

  // Remove previous suggestion
  const prev = document.getElementById('coach-suggestion');
  if (prev) prev.remove();

  if (!stockfish) {
    initStockfish();
    // Wait for ready then analyse
    const waitReady = setInterval(() => {
      if (sfReady) { clearInterval(waitReady); runAnalysis(); }
    }, 100);
    // Timeout after 5s
    setTimeout(() => { clearInterval(waitReady); if (!sfReady) showCoachError('Engine took too long to load. Try again.'); }, 5000);
  } else {
    runAnalysis();
  }
}

function runAnalysis() {
  if (!sfReady || !stockfish) { showCoachError('Engine not ready yet.'); return; }
  const fen = chess.fen();
  stockfish.postMessage('position fen ' + fen);
  stockfish.postMessage('go movetime 1500'); // think for 1.5 seconds
}

function showCoachError(msg) {
  const btn = document.getElementById('coach-btn');
  btn.className = 'coach-btn';
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Ask Coach — Best Move`;
  const prev = document.getElementById('coach-suggestion');
  if (prev) prev.remove();
  const coachCard = document.getElementById('coach-card');
  if (!coachCard) return;
  const box = document.createElement('div');
  box.id = 'coach-suggestion';
  box.className = 'c-box cb-warn';
  box.innerHTML = `<strong>⚠</strong> ${msg}`;
  coachCard.appendChild(box);
}

// Pre-init engine on page load for faster response
setTimeout(initStockfish, 1000);
</script>
